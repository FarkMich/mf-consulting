<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stránka sa nenašla (404) - Michal Farkaš</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='26' fill='%237B6CF6'/%3E%3Ctext x='50' y='68' font-family='Arial' font-size='46' font-weight='900' fill='white' text-anchor='middle'%3EMF%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0A0B14;--surface:#14152A;--ink:#F4F3FA;--dim:#A7A4C6;--violet:#7B6CF6;--violet-d:#6354E0;--pink:#E27BC2;--line:#2A2C4D;--disp:'Archivo',system-ui,sans-serif;--sans:'Inter',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
  .grad{background:linear-gradient(100deg,var(--violet),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand{width:52px;height:52px;border-radius:15px;background:var(--violet);display:grid;place-items:center;font-family:var(--disp);font-weight:900;font-size:19px;color:#fff;margin:0 auto 26px;box-shadow:0 0 0 2px rgba(123,108,246,.3)}
  h1{font-family:var(--disp);font-size:clamp(64px,14vw,120px);font-weight:900;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
  h2{font-family:var(--disp);font-size:clamp(22px,4vw,30px);font-weight:800;margin-bottom:14px}
  p{color:var(--dim);font-size:16px;max-width:44ch;margin:0 auto 30px}
  .actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn{font-family:var(--sans);font-weight:800;font-size:15px;padding:14px 26px;border-radius:30px;border:2px solid var(--line);color:var(--ink);display:inline-block;transition:.2s}
  .btn-primary{background:var(--violet);border-color:var(--violet);color:#fff;box-shadow:0 10px 28px -12px var(--violet)}
  .btn-primary:hover{background:var(--violet-d)}
  .btn-ghost:hover{border-color:var(--violet)}
</style>
</head>
<body>
  <div>
    <div class="brand">MF</div>
    <h1 class="grad">404</h1>
    <h2>Táto stránka sa nenašla</h2>
    <p>Odkaz je možno zastaraný alebo obsahuje preklep. Skús sa vrátiť na hlavnú stránku alebo pozri workshop.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Domov</a>
      <a class="btn btn-ghost" href="/workshop">Pozrieť workshop</a>
    </div>
  </div>
</body>
</html>
