  :root{
    --magenta:#CE0071; --yellow:#CE0071; --orange:#CE0071; --red:#CE0071;
    --purple:#CE0071; --blue:#CE0071; --teal:#CE0071;
    --bg:#DCDEE2; --surface:#FFFFFF; --surface2:#F5F6F7; --mid:#C4C6CB;
    --text:#121212; --text2:#6C6E72; --light:#2A2A2C;
    --spectrum:#CE0071; --line:rgba(18,18,18,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'HelveticaNow',-apple-system,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
  .script{font-family:'Tangerine',cursive;font-style:italic;color:var(--magenta);font-weight:normal;}

  /* COVER */
  .cover{padding:54px 40px 0;text-align:center;position:relative;}
  .cover img.logo{height:30px;margin-bottom:30px;opacity:.97;}
  .cover h1{font-family:'HNBlack';font-size:56px;letter-spacing:-1px;line-height:1;}
  .cover .sub{font-size:15px;color:var(--text2);margin-top:12px;}
  .cover .period{display:inline-block;border:1px solid var(--mid);border-radius:20px;padding:6px 20px;font-size:12px;color:var(--text2);margin-top:22px;letter-spacing:1px;}
  .spectrum-strip{height:4px;background:var(--spectrum);border-radius:4px;max-width:900px;margin:34px auto 0;}

  .container{max-width:920px;margin:0 auto;padding:0 22px 70px;}

  /* TABS */
  .tabs{display:flex;gap:8px;justify-content:center;margin:30px 0 6px;flex-wrap:wrap;}
  .tab-btn{background:var(--surface);color:var(--text2);border:1px solid var(--mid);border-radius:24px;padding:10px 26px;font-family:inherit;font-size:13px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.18s;}
  .tab-btn:hover{color:var(--text);border-color:#555;}
  .tab-btn.active{background:var(--magenta);color:#fff;border-color:var(--magenta);}
  .tab-panel{display:none;animation:fade .35s ease;}
  .tab-panel.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .section-title{font-size:11px;font-weight:normal;letter-spacing:2.5px;text-transform:uppercase;color:var(--text2);margin:42px 0 16px;padding-bottom:9px;border-bottom:1px solid var(--mid);display:flex;align-items:center;gap:12px;}
  .section-title .num{font-family:'Tangerine',cursive;font-style:italic;font-size:30px;background:var(--spectrum);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:.7;}

  /* KPI GRID */
  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .kpi-card{background:var(--surface);border-radius:14px;padding:22px 20px;border:1px solid var(--line);border-top:3px solid var(--magenta);}
  .kpi-card.c2{border-color:var(--blue);} .kpi-card.c3{border-color:var(--teal);}
  .kpi-card.c4{border-color:var(--orange);} .kpi-card.c5{border-color:var(--purple);} .kpi-card.c6{border-color:var(--yellow);}
  .kpi-label{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);margin-bottom:9px;}
  .kpi-value{font-family:'HNBlack';font-size:44px;line-height:1;letter-spacing:-.5px;color:var(--text);}
  .kpi-sub{font-size:12px;color:var(--text2);margin-top:7px;}
  .badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:10px;margin-top:10px;letter-spacing:.3px;}
  .badge.up{background:rgba(206,0,113,.16);color:#CE0071;}
  .badge.down{background:rgba(178,180,183,.12);color:var(--text2);}
  .badge.flat{background:rgba(178,180,183,.12);color:var(--text2);}

  /* TWO-COLUMN CARDS */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{background:var(--surface);border-radius:14px;padding:24px;border:1px solid var(--line);}
  .card h3{font-size:13px;font-weight:normal;letter-spacing:.5px;color:var(--light);margin-bottom:18px;}
  .bar-row{display:flex;align-items:center;margin-bottom:13px;gap:10px;}
  .bar-label{font-size:12px;color:var(--text2);width:110px;flex-shrink:0;}
  .bar-track{flex:1;background:#E2E4E8;border-radius:6px;height:8px;overflow:hidden;}
  .bar-fill{height:8px;border-radius:6px;background:var(--spectrum);}
  .bar-fill.solid{background:var(--magenta);} .bar-fill.mute{background:var(--mid);}
  .bar-pct{font-size:12px;color:var(--text);width:62px;text-align:right;flex-shrink:0;}
  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #ECEDEF;}
  .stat-row:last-child{border-bottom:none;}
  .stat-name{font-size:13px;color:var(--text2);}
  .stat-val{font-size:14px;color:var(--text);}

  /* RATIO HERO */
  .ratio-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:14px;}
  .ratio-hero{background:var(--surface);border:1px solid var(--mid);border-radius:14px;padding:26px;text-align:center;position:relative;overflow:hidden;}
  .ratio-hero::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--spectrum);}
  .ratio-hero .big{font-family:'HNBlack';font-size:52px;color:var(--magenta);line-height:1;letter-spacing:-.5px;}
  .ratio-hero .lbl{font-size:13px;color:var(--text2);margin-top:8px;}
  .ratio-hero .sub{font-size:11px;color:var(--mid);margin-top:6px;}
  .ratio-mini{background:var(--surface);border-radius:14px;padding:22px;text-align:center;border:1px solid var(--line);}
  .ratio-mini .val{font-family:'HNBlack';font-size:30px;color:var(--text);letter-spacing:-.5px;}
  .ratio-mini .lbl{font-size:10.5px;color:var(--text2);margin-top:6px;text-transform:uppercase;letter-spacing:1px;}

  /* TABLE */
  .posts-table{width:100%;background:var(--surface);border-radius:14px;overflow:hidden;border-collapse:collapse;}
  .posts-table th{background:#F0F1F3;color:var(--text2);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;padding:13px 14px;text-align:left;font-weight:normal;}
  .posts-table td{padding:13px 14px;font-size:13px;border-bottom:1px solid #ECEDEF;vertical-align:middle;color:var(--text);}
  .posts-table tr:last-child td{border-bottom:none;}
  .posts-table tr:nth-child(even) td{background:var(--surface2);}
  .rank{display:inline-block;width:24px;height:24px;border-radius:50%;background:var(--mid);color:#fff;font-size:11px;text-align:center;line-height:24px;}
  .rank.g1,.rank.g2,.rank.g3{background:#CE0071;color:#fff;}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:9px;}
  .pill.save{background:rgba(206,0,113,.12);color:#CE0071;}
  .pill.share{background:rgba(206,0,113,.12);color:#CE0071;}
  .pf{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);}
  .pf.ig{color:#E1306C;} .pf.tt{color:var(--teal);}

  .note{background:rgba(206,0,129,.06);border:1px solid rgba(206,0,129,.25);border-radius:12px;padding:18px 22px;font-size:12.5px;color:var(--text2);line-height:1.65;margin-top:18px;}
  .note strong{color:var(--light);}
  .footer{text-align:center;padding:34px 20px;font-size:11px;color:var(--mid);}
  .footer .spectrum-strip{margin-bottom:20px;}

  @media(max-width:640px){
    .kpi-grid{grid-template-columns:1fr 1fr;} .grid2{grid-template-columns:1fr;} .ratio-grid{grid-template-columns:1fr;}
    .cover h1{font-size:30px;} .posts-table{font-size:11px;} .posts-table th,.posts-table td{padding:9px 8px;}
  }
</style>
</head>

<script>
/* ============================================================
   DATA  -  the only block that changes each week.
   Instagram: pulled live from Windsor.ai (account feel.afterglow).
   TikTok: not yet linked in Windsor - shows a placeholder tab.
   Fields the IG API does not expose are set to null and the
   report shows "n/a" rather than inventing a number.
   ============================================================ */
const DATA = {
  weekLabel: "Jun 8 - Jun 14, 2026",
  generated: "Jun 15, 2026",
  instagram: {
    connected: true,
    followers: 749, prevFollowers: 745,
    views: 21591, prevViews: 9149,
    reach: 13214, prevReach: 4689,
    followerViewPct: null,          // follower vs non-follower view split not exposed by IG API
    likes: 8, comments: 0, saves: 4, shares: 4,
    prevInteractions: 75,
    profileVisits: null, linkTaps: 0, // profile visits deprecated in IG API
    topPosts: [
      {title:"We're going to Berlin (TRYP EXPO)",   date:"May 9",  views:702, likes:12, comments:3, saves:1, shares:2},
      {title:"Sleeping like a baby",                date:"May 16", views:535, likes:17, comments:0, saves:0, shares:1},
      {title:"TRYP EXPO - glowing longer",          date:"May 16", views:496, likes:11, comments:2, saves:0, shares:0},
      {title:"10 weekends, 10 clear Mondays",       date:"Apr 25", views:479, likes:6,  comments:4, saves:2, shares:0},
      {title:"Go deep, come back whole",            date:"Apr 30", views:461, likes:5,  comments:1, saves:0, shares:7}
    ]
  },
  tiktok: {
    connected: false   // link TikTok inside Windsor.ai to populate this tab
  }
};

/* ===================== helpers ===================== */
const $ = s => document.querySelector(s);
const fmt = n => Math.round(n).toLocaleString('en-US');
const compact = n => {
  if (n >= 1e6) return (n/1e6).toFixed(n>=1e7?0:1).replace(/\.0$/,'')+'M';
  if (n >= 1e3) return (n/1e3).toFixed(n>=1e4?0:1).replace(/\.0$/,'')+'K';
  return fmt(n);
};
const interactions = p => p.likes + p.comments + p.saves + p.shares;
const postTotal = q => q.likes + q.comments + q.saves + q.shares;

function delta(cur, prev){
  if (prev == null || prev === 0) return {cls:'flat', txt:'-'};
  const d = (cur - prev) / prev * 100;
  const arrow = d > 0.5 ? '▲' : d < -0.5 ? '▼' : '▬';
  const cls = d > 0.5 ? 'up' : d < -0.5 ? 'down' : 'flat';
  return {cls, txt:`${arrow} ${Math.abs(d).toFixed(1)}% WoW`};
}

/* build the synthetic "total" platform by combining connected platforms only */
function buildTotal(){
  const platforms = [DATA.instagram, DATA.tiktok].filter(p => p && p.connected);
  const tagFor = p => p === DATA.instagram ? 'ig' : 'tt';
  const sum = k => platforms.reduce((a,p)=>a + (p[k]||0), 0);
  const totalViews = sum('views');
  const haveSplit = platforms.length>0 && platforms.every(p=>p.followerViewPct!=null);
  const followerViews = haveSplit ? platforms.reduce((a,p)=>a + p.views*p.followerViewPct/100, 0) : 0;
  const tagged = platforms.flatMap(p => p.topPosts.map(q=>({...q, platform:tagFor(p)})))
    .sort((a,b)=>postTotal(b)-postTotal(a)).slice(0,5);
  return {
    connected:true, multi: platforms.length>1,
    followers:sum('followers'), prevFollowers:sum('prevFollowers'),
    views:totalViews, prevViews:sum('prevViews'),
    reach:sum('reach'), prevReach:sum('prevReach'),
    followerViewPct: haveSplit && totalViews ? Math.round(followerViews/totalViews*100) : null,
    likes:sum('likes'), comments:sum('comments'), saves:sum('saves'), shares:sum('shares'),
    prevInteractions:sum('prevInteractions'),
    profileVisits: platforms.some(p=>p.profileVisits!=null) ? sum('profileVisits') : null,
    linkTaps:sum('linkTaps'),
    topPosts:tagged, isTotal:true
  };
}

/* ===================== renderer ===================== */
function render(p, key){
  const inter = interactions(p);
  const netNew = p.followers - p.prevFollowers;
  const growth = p.prevFollowers ? (netNew/p.prevFollowers*100) : 0;
  const erReach = p.reach ? (inter/p.reach*100) : 0;
  const erFoll  = p.followers ? (inter/p.followers*100) : 0;
  const ratio   = p.followers ? (p.views/p.followers) : 0;
  const hasSplit = p.followerViewPct != null;
  const nonFollPct = hasSplit ? 100 - p.followerViewPct : null;
  const naFmt = v => (v == null ? 'n/a' : fmt(v));
  const dViews = delta(p.views, p.prevViews);
  const dReach = delta(p.reach, p.prevReach);
  const dInter = delta(inter, p.prevInteractions);
  const dFoll  = delta(p.followers, p.prevFollowers);
  const savesLbl = key === 'tiktok' ? 'Favorites' : 'Saves';

  // interaction component bars (share of total interactions)
  const comp = [
    ['Likes', p.likes, 'spectrum'], ['Shares', p.shares, 'solid'],
    [savesLbl, p.saves, 'solid'], ['Comments', p.comments, 'mute']
  ];
  const maxComp = Math.max(...comp.map(c=>c[1]));
  const compBars = comp.map(([lbl,val])=>`
    <div class="bar-row"><div class="bar-label">${lbl}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${maxComp?(val/maxComp*100):0}%"></div></div>
    <div class="bar-pct">${fmt(val)}</div></div>`).join('');

  const rows = p.topPosts.map((q,i)=>{
    const rc = i===0?'g1':i===1?'g2':i===2?'g3':'';
    const pf = p.isTotal ? `<span class="pf ${q.platform}">${q.platform==='ig'?'IG':'TT'}</span> ` : '';
    return `<tr>
      <td><span class="rank ${rc}">${i+1}</span></td>
      <td>${pf}<strong style="font-weight:normal">${q.title}</strong></td>
      <td>${q.date}</td>
      <td>${compact(q.views)}</td>
      <td>${fmt(q.likes)}</td>
      <td>${fmt(q.comments)}</td>
      <td><span class="pill save">${fmt(q.saves)}</span></td>
      <td><span class="pill share">${fmt(q.shares)}</span></td>
      <td>${fmt(postTotal(q))}</td>
    </tr>`;
  }).join('');

  return `
  <div class="section-title"><span class="num">01</span> Account overview</div>
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Total views</div><div class="kpi-value">${compact(p.views)}</div>
      <div class="kpi-sub">${fmt(p.views)} across all content</div><span class="badge ${dViews.cls}">${dViews.txt}</span></div>
    <div class="kpi-card c2"><div class="kpi-label">Accounts reached</div><div class="kpi-value">${compact(p.reach)}</div>
      <div class="kpi-sub">${fmt(p.reach)} accounts</div><span class="badge ${dReach.cls}">${dReach.txt}</span></div>
    <div class="kpi-card c4"><div class="kpi-label">Total interactions</div><div class="kpi-value">${compact(inter)}</div>
      <div class="kpi-sub">Likes, comments, ${savesLbl.toLowerCase()} &amp; shares</div><span class="badge ${dInter.cls}">${dInter.txt}</span></div>
    <div class="kpi-card c5"><div class="kpi-label">Followers</div><div class="kpi-value">${fmt(p.followers)}</div>
      <div class="kpi-sub">Current total</div><span class="badge ${dFoll.cls}">${dFoll.txt}</span></div>
    <div class="kpi-card c3"><div class="kpi-label">Net new followers</div><div class="kpi-value">${netNew>=0?'+':''}${fmt(netNew)}</div>
      <div class="kpi-sub">${growth>=0?'+':''}${growth.toFixed(1)}% this week</div></div>
    <div class="kpi-card c6"><div class="kpi-label">Engagement rate</div><div class="kpi-value">${erReach.toFixed(1)}%</div>
      <div class="kpi-sub">interactions ÷ reach</div></div>
  </div>

  <div class="section-title"><span class="num">02</span> Reach &amp; views</div>
  <div class="grid2">
    <div class="ratio-hero"><div class="big">${ratio.toFixed(0)}x</div><div class="lbl">Views-to-followers ratio</div>
      <div class="sub">${fmt(p.views)} views ÷ ${fmt(p.followers)} followers</div></div>
    <div class="card"><h3>The numbers</h3>
      <div class="stat-row"><span class="stat-name">Total views</span><span class="stat-val">${fmt(p.views)}</span></div>
      <div class="stat-row"><span class="stat-name">Accounts reached</span><span class="stat-val">${fmt(p.reach)}</span></div>
      <div class="stat-row"><span class="stat-name">Link taps</span><span class="stat-val">${fmt(p.linkTaps)}</span></div>
    </div>
  </div>

  <div class="section-title"><span class="num">03</span> Engagement</div>
  <div class="grid2">
    <div class="card"><h3>Interactions breakdown</h3>${compBars}</div>
    <div class="card"><h3>Engagement rates</h3>
      <div class="stat-row"><span class="stat-name">Interactions ÷ reach</span><span class="stat-val" style="color:var(--magenta)">${erReach.toFixed(1)}%</span></div>
      <div class="stat-row"><span class="stat-name">Interactions ÷ followers</span><span class="stat-val" style="color:var(--blue)">${erFoll.toFixed(1)}%</span></div>
      <div class="stat-row"><span class="stat-name">Total interactions</span><span class="stat-val">${fmt(inter)}</span></div>
      <div class="stat-row"><span class="stat-name">${savesLbl} + shares</span><span class="stat-val">${fmt(p.saves+p.shares)}</span></div>
    </div>
  </div>

  <div class="section-title"><span class="num">04</span> Follower growth</div>
  <div class="kpi-grid">
    <div class="kpi-card c5"><div class="kpi-label">Followers now</div><div class="kpi-value">${fmt(p.followers)}</div><div class="kpi-sub">end of week</div></div>
    <div class="kpi-card c3"><div class="kpi-label">Net new this week</div><div class="kpi-value">${netNew>=0?'+':''}${fmt(netNew)}</div><div class="kpi-sub">from ${fmt(p.prevFollowers)}</div></div>
    <div class="kpi-card c2"><div class="kpi-label">Growth rate</div><div class="kpi-value">${growth>=0?'+':''}${growth.toFixed(1)}%</div><div class="kpi-sub">week over week</div></div>
  </div>

  <div class="section-title"><span class="num">05</span> Top 5 posts</div>
  <table class="posts-table"><thead><tr>
    <th>#</th><th>Post</th><th>Date</th><th>Views</th><th>Likes</th><th>Comments</th><th>${savesLbl}</th><th>Shares</th><th>Total</th>
  </tr></thead><tbody>${rows}</tbody></table>
  `;
}

/* placeholder panel for a platform that isn't connected yet */
function placeholder(name){
  return `
  <div class="section-title"><span class="num">~</span> ${name}</div>
  <div class="card" style="text-align:center;padding:50px 30px">
    <div style="font-size:18px;margin-bottom:10px">${name} isn't connected yet</div>
    <div style="color:var(--text2);font-size:13px;line-height:1.6;max-width:460px;margin:0 auto">
      To populate this tab, link your ${name} Business account inside Windsor.ai (Add data source -> ${name} Organic).
      Once it's connected, this tab and the Total fill in automatically on the next refresh.
    </div>
  </div>`;
}

/* ===================== boot ===================== */
$('#period').textContent = '📅 ' + DATA.weekLabel;
$('#footer-text').textContent = 'Afterglow · Instagram performance · generated ' + DATA.generated;
$('#panel-instagram').innerHTML = render(DATA.instagram, 'instagram');
</script>
</body>
</html>
